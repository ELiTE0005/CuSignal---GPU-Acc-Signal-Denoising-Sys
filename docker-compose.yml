services:
  cusignal-dev:
    build: .
    environment:
      MSTAR_ROOT: /data/MSTAR
    volumes:
      - .:/app/cusignal_project
      - ./archive/MSTAR:/data/MSTAR:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
